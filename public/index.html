<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Snake Survivor">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css?v=85">
    <title>Snake Survivor</title>
</head>
<body>
    <div id="game-area">
        <button id="btn-opts" class="opts-trigger" title="Settings">⚙</button>
        <div id="profile-header">
            <button id="player-name-disp" title="Tap to change photo">
                <span id="sb-av" class="sb-av">🐍</span>
                <span id="sb-name-text"></span>
            </button>
        </div>
        <div id="adv-hud">
            <div id="xp-bar-wrap"><div id="xp-bar-fill"></div></div>
            <span id="xp-level-badge">Lv 1</span>
        </div>
        <div id="scoreboard">
            <span>SCORE: <span id="score-val">0</span></span>
            <span>BEST: <span id="highscore-val">0</span></span>
        </div>
        <div id="ability-hud">
            <div id="gesture-slots">
                <div class="gslot empty" id="gslot-hold"><span class="gslot-tag">HOLD</span><span class="gslot-name" id="gslot-hold-name">—</span></div>
                <div class="gslot empty" id="gslot-tap"><span class="gslot-tag">TAP</span><span class="gslot-name" id="gslot-tap-name">—</span></div>
            </div>
            <div id="ability-icons"></div>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>

    <!-- Options panel: fixed, slides down from top -->
    <div id="options-panel">
        <div class="opt-row">
            <span class="opt-label">MASTER</span>
            <input type="range" id="sl-master" min="0" max="100">
            <span class="opt-val" id="vl-master">80</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">MUSIC</span>
            <input type="range" id="sl-music" min="0" max="100">
            <span class="opt-val" id="vl-music">70</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">SFX</span>
            <input type="range" id="sl-sfx" min="0" max="100">
            <span class="opt-val" id="vl-sfx">80</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">HAPTICS</span>
            <button id="btn-haptics" class="toggle-btn">ON</button>
        </div>
        <div class="opt-row">
            <span class="opt-label">DIFF</span>
            <button id="btn-easy"   class="toggle-btn off" style="padding:5px 12px">EASY</button>
            <button id="btn-normal" class="toggle-btn"     style="padding:5px 12px">NORM</button>
        </div>
        <div class="opt-row" id="row-char-select">
            <span class="opt-label">SNAKE</span>
            <button id="btn-char-select" class="toggle-btn off" style="flex:1;padding:5px 10px">Racer ▸</button>
        </div>
        <div class="opt-row">
            <span class="opt-label">HAND</span>
            <button id="btn-hand-r" class="toggle-btn"     style="padding:5px 10px">RIGHT</button>
            <button id="btn-hand-l" class="toggle-btn off" style="padding:5px 10px">LEFT</button>
        </div>
        <div class="opt-row" style="gap:8px">
            <button id="btn-lb" class="toggle-btn off" style="flex:1;padding:5px 8px">🏆 SCORES</button>
            <button id="btn-fs" class="toggle-btn off" style="flex:1;padding:5px 8px">⛶ FULL</button>
        </div>
        <div class="opt-row">
            <span class="opt-label">GRASS</span>
            <button id="btn-grass" class="toggle-btn off">OFF</button>
        </div>
        <div class="opt-row"><span class="opt-label" style="opacity:0.6">— VISUAL DEBUG —</span></div>
        <div class="opt-row">
            <span class="opt-label">GRASS #</span>
            <input type="range" id="sl-grass-count" min="1" max="60" step="1">
            <span class="opt-val" id="vl-grass-count">7</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">G-LENGTH</span>
            <input type="range" id="sl-grass-len" min="20" max="300" step="5">
            <span class="opt-val" id="vl-grass-len">100%</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">G-WIDTH</span>
            <input type="range" id="sl-grass-width" min="20" max="300" step="5">
            <span class="opt-val" id="vl-grass-width">100%</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">G-OUTLINE</span>
            <input type="range" id="sl-grass-outline" min="0" max="300" step="5">
            <span class="opt-val" id="vl-grass-outline">100%</span>
        </div>
        <div class="opt-row">
            <span class="opt-label">SNK-OUTLINE</span>
            <input type="range" id="sl-snake-outline" min="0" max="300" step="5">
            <span class="opt-val" id="vl-snake-outline">100%</span>
        </div>
        <div class="opt-row" style="gap:8px">
            <button id="btn-grass-reset" class="toggle-btn off" style="flex:1;padding:5px 8px">↺ RESET VISUAL</button>
        </div>
        <div class="opt-row"><span class="opt-label" style="opacity:0.6">— ABILITY DEBUG —</span></div>
        <div class="opt-row">
            <span class="opt-label">ABILITY</span>
            <select id="sl-dbg-ability" class="dbg-select"></select>
            <span class="opt-val" id="vl-dbg-ability-lvl" style="width:20px">L0</span>
        </div>
        <div class="opt-row" style="gap:6px">
            <button class="toggle-btn off dbg-lvl-btn" data-lvl="0" style="flex:1;padding:5px 0">0</button>
            <button class="toggle-btn off dbg-lvl-btn" data-lvl="1" style="flex:1;padding:5px 0">1</button>
            <button class="toggle-btn off dbg-lvl-btn" data-lvl="2" style="flex:1;padding:5px 0">2</button>
            <button class="toggle-btn off dbg-lvl-btn" data-lvl="3" style="flex:1;padding:5px 0">3</button>
        </div>
        <div class="opt-row" style="gap:8px">
            <button id="btn-dbg-maxall"   class="toggle-btn off" style="flex:1;padding:5px 8px">MAX ALL</button>
            <button id="btn-dbg-resetall" class="toggle-btn off" style="flex:1;padding:5px 8px">RESET ALL</button>
        </div>
        <div class="opt-row">
            <span class="opt-label">SNK LEN</span>
            <input type="range" id="sl-dbg-length" min="1" max="60" step="1">
            <span class="opt-val" id="vl-dbg-length">5</span>
        </div>
        <div class="opt-row" style="gap:8px">
            <button id="btn-dbg-xp"      class="toggle-btn off" style="flex:1;padding:5px 8px">+50 XP</button>
            <button id="btn-dbg-lvlup"   class="toggle-btn off" style="flex:1;padding:5px 8px">FORCE LEVEL UP</button>
        </div>
        <div id="opts-close-bar">▼ close</div>
    </div>

    <!-- Swipe zone: dedicated swipe area + small pause button -->
    <div id="swipe-zone">
        <button id="btn-pause" class="pause-btn" title="Pause">⏸</button>
    </div>

    <!-- Level-up overlay -->
    <div id="levelup-overlay" class="game-overlay hidden">
        <div class="overlay-box">
            <div class="overlay-title">LEVEL UP!</div>
            <div id="levelup-cards"></div>
        </div>
    </div>

    <!-- Difficulty select overlay: step 1 of the pre-game start flow -->
    <div id="difficulty-overlay" class="game-overlay hidden">
        <div class="overlay-box">
            <div class="overlay-title">CHOOSE DIFFICULTY</div>
            <button id="btn-flow-easy" class="overlay-btn diff-choice">
                <span class="diff-choice-name">EASY</span>
                <span class="diff-choice-sub">Smaller board, slower pace</span>
            </button>
            <button id="btn-flow-normal" class="overlay-btn diff-choice">
                <span class="diff-choice-name">NORMAL</span>
                <span class="diff-choice-sub">Standard board and speed</span>
            </button>
        </div>
    </div>

    <!-- Character select overlay: step 2 of the pre-game start flow, also reused as a
         standalone options-panel entry for changing your default pick (see openCharacterOverlay) -->
    <div id="character-overlay" class="game-overlay hidden">
        <div class="overlay-box">
            <div class="overlay-title">CHOOSE YOUR SNAKE</div>
            <div id="char-list"></div>
            <div id="char-desc"></div>
            <button id="btn-char-close" class="overlay-btn secondary">Done</button>
            <button id="btn-char-start" class="overlay-btn hidden">START ▶</button>
        </div>
    </div>

    <!-- Profile creation overlay -->
    <div id="profile-overlay" class="game-overlay hidden">
        <div class="overlay-box">
            <div class="overlay-title" id="profile-overlay-title">CREATE PROFILE</div>
            <div id="avatar-preview">🐍</div>
            <div class="avatar-opts">
                <button class="overlay-btn secondary" id="btn-take-photo">📷 Camera</button>
                <button class="overlay-btn secondary" id="btn-pick-photo">🖼 Gallery</button>
            </div>
            <input id="input-camera"  type="file" accept="image/*" capture="user" style="display:none">
            <input id="input-gallery" type="file" accept="image/*" style="display:none">
            <input id="input-name" class="overlay-inp" type="text" maxlength="16" placeholder="Your name" autocomplete="off">
            <button id="btn-save-profile" class="overlay-btn">LET'S GO ▶</button>
            <button id="btn-skip-profile" class="overlay-btn secondary">Skip</button>
        </div>
    </div>

    <!-- Leaderboard overlay -->
    <div id="leaderboard-overlay" class="game-overlay hidden">
        <div class="overlay-box">
            <div class="overlay-title">HIGH SCORES</div>
            <div id="lb-list"></div>
            <div class="lb-row">
                <button id="btn-new-profile" class="overlay-btn secondary">+ New Profile</button>
                <button id="btn-lb-close"    class="overlay-btn secondary">Close</button>
            </div>
            <div id="lb-bottom"></div>
        </div>
    </div>

    <script src="client.js?v=85"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
